<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke/Break Trainer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-dark">

    <div class="app-container">
        <div class="top-bar">
            <h2><i class="fa-solid fa-fire"></i> Training Console</h2>
            <div class="theme-control">
                <select id="theme-select">
                    <option value="theme-dark">Default Dark</option>
                    <option value="theme-steam">Steam Blue</option>
                    <option value="theme-light">Clean White</option>
                    <option value="theme-amber">Ember Orange</option>
                </select>
            </div>
        </div>

        <div id="main-timer-container">
            <!-- The training timer will live here exclusively -->
        </div>

        <footer>
            <button id="clear-data-btn" class="text-btn">Reset Session Stats</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
